<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioscan | Vision Test</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --primary-neon: #00f2ff;
  --secondary-neon: #7000ff;
  --bg-dark: #020408;
  --glass-panel: rgba(8, 15, 25, 0.92);
  --border-color: rgba(0, 242, 255, 0.4);
  --text-main: #e0f7fa;
  --error: #ff2a2a;
  --success: #00ff88;
  --warning: #f39c12;
  --vision-color: #1dd1a1;
}

* { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  padding-top: 85px;
}

/* BACKGROUND */
#bio-background {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  overflow: hidden; background: radial-gradient(circle at center, #0f1c2e 0%, #000000 100%);
}
.bio-symbol {
  position: absolute; color: var(--primary-neon); opacity: 0.15;
  animation: floatBio 20s linear infinite; pointer-events: none;
}
@keyframes floatBio {
  0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
  50% { opacity: 0.2; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: #050b14; }
::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 10px; }

header {
  width: 100%;
  position: fixed; top: 0; left: 0; height: 75px;
  background: rgba(5, 10, 18, 0.98); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--primary-neon);
  box-shadow: 0 0 25px rgba(0, 242, 255, 0.15); z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  box-sizing: border-box;
}

header h1 {
  font-size: 1.1rem;
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--primary-neon);
  text-transform: uppercase;
}

.exit-btn {
  background: rgba(255, 42, 42, 0.1);
  border: 1px solid var(--error);
  color: var(--error);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: 0.3s;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}

.exit-btn:hover {
  background: var(--error);
  color: #fff;
  box-shadow: 0 0 15px var(--error);
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-grow: 1;
  width: 100%;
  padding: 20px;
  margin-top: 10px;
}

.card {
  background: linear-gradient(135deg, rgba(10, 20, 35, 0.95), rgba(5, 10, 20, 0.95));
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 30px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
  animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

canvas {
  display: block;
  margin: 20px auto;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
  border: 2px solid var(--primary-neon);
  transition: transform 0.3s ease;
}

.progress-container {
  width: 100%;
  background: rgba(0, 242, 255, 0.1);
  height: 10px;
  border-radius: 10px;
  margin: 15px 0;
  overflow: hidden;
  border: 1px solid rgba(0, 242, 255, 0.3);
}

.progress-bar-inner {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--primary-neon), var(--success));
  transition: width 0.4s ease;
  box-shadow: 0 0 15px var(--primary-neon);
}

.status {
  font-size: 0.95rem;
  color: var(--text-main);
  margin-bottom: 20px;
  min-height: 24px;
  font-weight: 500;
  font-family: 'Rajdhani', sans-serif;
}

.controls {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  grid-template-rows: repeat(2, 60px);
  gap: 10px;
  justify-content: center;
  margin-top: 15px;
}

.controls button {
  width: 60px;
  height: 60px;
  font-size: 24px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  background: rgba(0, 242, 255, 0.05);
  color: var(--primary-neon);
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  justify-content: center;
  align-items: center;
}

.controls button:hover {
  background: var(--primary-neon);
  color: #000;
  transform: scale(1.1);
  box-shadow: 0 0 20px var(--primary-neon);
}

.btn-up { grid-column: 2; grid-row: 1; }
.btn-left { grid-column: 1; grid-row: 2; }
.btn-down { grid-column: 2; grid-row: 2; }
.btn-right { grid-column: 3; grid-row: 2; }

.eye-btn {
  flex: 1;
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  background: rgba(0, 242, 255, 0.1);
  color: var(--text-main);
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Rajdhani', sans-serif;
  box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
  font-size: 0.95rem;
}

.eye-btn:hover {
  background: var(--primary-neon);
  color: #000;
  box-shadow: 0 0 25px var(--primary-neon);
  transform: scale(1.05);
  border-color: var(--primary-neon);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.popup {
  background: linear-gradient(135deg, rgba(10, 20, 35, 0.98), rgba(5, 10, 20, 0.98));
  border: 2px solid var(--primary-neon);
  border-radius: 20px;
  padding: 35px;
  max-width: 450px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
  color: var(--text-main);
  position: relative;
  animation: popupAppear 0.4s ease-out;
}

@keyframes popupAppear {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.popup h2 { 
  color: var(--primary-neon); 
  margin-top: 0; 
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 1px;
}

.popup .score { 
  font-size: 2.5rem; 
  font-weight: bold; 
  margin: 15px 0; 
  color: var(--success); 
  text-shadow: 0 0 15px var(--success);
  font-family: 'Orbitron', sans-serif;
}

.popup .advice { 
  background: rgba(0, 242, 255, 0.1); 
  padding: 15px; 
  border-radius: 12px; 
  border: 1px solid rgba(0, 242, 255, 0.3);
  margin: 20px 0; 
  font-size: 0.95rem; 
  line-height: 1.6;
  color: var(--text-main);
}

.popup .actions { 
  display: flex; 
  flex-direction: column; 
  gap: 12px; 
  margin-top: 25px; 
}

.popup button {
  padding: 12px; 
  border-radius: 12px; 
  border: none; 
  cursor: pointer; 
  font-weight: 600; 
  font-family: 'Orbitron', sans-serif; 
  transition: 0.3s; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  gap: 8px;
  font-size: 0.9rem;
}

.btn-retry { 
  background: var(--success); 
  color: #000; 
}
.btn-retry:hover {
  box-shadow: 0 0 20px var(--success);
  transform: translateY(-2px);
}

.btn-save {
  background: var(--primary-neon);
  color: #000;
}
.btn-save:hover {
  box-shadow: 0 0 20px var(--primary-neon);
  transform: translateY(-2px);
}

.btn-close { 
  background: transparent; 
  border: 1px solid var(--border-color); 
  color: var(--text-main); 
}
.btn-close:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--primary-neon);
}

.btn-speak-result {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(0, 242, 255, 0.1);
  border: 1px solid var(--primary-neon);
  color: var(--primary-neon);
  width: 40px; 
  height: 40px;
  border-radius: 50%;
  display: flex; 
  justify-content: center; 
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
}
.btn-speak-result:hover { 
  background: var(--primary-neon); 
  color: #000; 
  box-shadow: 0 0 15px var(--primary-neon);
}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>
<div id="bio-background"></div>

<header>
  <h1><i class="fas fa-eye"></i> BioScan Vision</h1>
  <button id="exitBtn" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</button>
</header>

<div class="container">
  <div class="card">
    <!-- اختيار العين -->
    <div style="margin-bottom:15px; display:flex; justify-content:center; gap:15px;">
      <button id="eyeRightBtn" class="eye-btn">Right Eye</button>
      <button id="eyeLeftBtn" class="eye-btn">Left Eye</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar-inner" id="pbar"></div>
    </div>

    <canvas id="cv" width="300" height="300"></canvas>

    <div class="status" id="status">Select the eye to start</div>

    <div class="controls">
      <button class="btn-up" data-dir="270"><i class="fas fa-arrow-up"></i></button>
      <button class="btn-left" data-dir="180"><i class="fas fa-arrow-left"></i></button>
      <button class="btn-down" data-dir="90"><i class="fas fa-arrow-down"></i></button>
      <button class="btn-right" data-dir="0"><i class="fas fa-arrow-right"></i></button>
    </div>

  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <button class="btn-speak-result" onclick="speakFinalResult()">
      <i class="fas fa-volume-up"></i>
    </button>

    <h2><i class="fas fa-clipboard-check"></i> Test Result</h2>
    <div id="popupText">Vision Test Results:</div>
    <div id="popupScore" class="score"></div>
    <div id="popupAdvice" class="advice"></div>

    <div class="actions">
      <button id="saveBtn" class="btn-save"><i class="fas fa-save"></i> Save to History</button>
      <button id="retryBtn" class="btn-retry"><i class="fas fa-redo"></i> Retry Test</button>
      <button id="closeBtn" class="btn-close">Close</button>
    </div>
  </div>
</div>


<script>
// --- ANIMATED BACKGROUND ---
function createBioBackground() {
  const container = document.getElementById('bio-background');
  const icons = ['fa-eye', 'fa-glasses', 'fa-low-vision', 'fa-eye-dropper', 'fa-binoculars'];
  const count = 25;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('i');
    el.classList.add('fas', icons[Math.floor(Math.random() * icons.length)], 'bio-symbol');
    el.style.left = Math.random() * 100 + 'vw';
    const size = Math.random() * 2 + 0.5;
    el.style.fontSize = size + 'rem';
    el.style.opacity = Math.random() * 0.2;
    el.style.animationDuration = (Math.random() * 20 + 15) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(el);
  }
}
createBioBackground();

// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAOwMQhsRM2PdD_FLjW_8Oi1WlFS3EO5pY",
  authDomain: "smart-a76a0.firebaseapp.com",
  databaseURL: "https://smart-a76a0-default-rtdb.firebaseio.com",
  projectId: "smart-a76a0",
  messagingSenderId: "343693501983",
  appId: "1:343693501983:web:10ea3fce9d990a2455172a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
auth.signInAnonymously().catch(console.error);

const currentUserId = localStorage.getItem("selectedUserId");

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const status = document.getElementById('status');
const controls = document.querySelectorAll('.controls button');
const overlay = document.getElementById('overlay');
const popupScore = document.getElementById('popupScore');
const popupAdvice = document.getElementById('popupAdvice');
const pbar = document.getElementById('pbar');

const viewingDistanceCm = 40;
const visualAngleArcMin = 5;
const visualAngleRad = (visualAngleArcMin / 60) * Math.PI / 180;
const optotypeSizeCm = viewingDistanceCm * Math.tan(visualAngleRad);
const pxPerCm = 37.8;
let baseRadius = (optotypeSizeCm * pxPerCm) / 2;
baseRadius = Math.max(baseRadius, 25);
let radius = baseRadius;

const directions = [0, 90, 180, 270];
let level = 1, totalLevels = 12, active=false;
let eye = null;
let nextEye = null;
let results = { right:{correct:0}, left:{correct:0} };

// اختيار العين مع تعيين العين التالية
document.getElementById('eyeRightBtn').onclick = ()=>{
  eye='right';
  nextEye='left';
  startTest();
};
document.getElementById('eyeLeftBtn').onclick = ()=>{
  eye='left';
  nextEye=null;
  startTest();
};

function startTest(){
  level=1; radius=baseRadius; results[eye].correct=0;
  nextRound();
}

function drawLandolt(angle){
  ctx.clearRect(0,0,cv.width,cv.height);
  const cx=cv.width/2, cy=cv.height/2, lineW=Math.max(10,radius*0.22);
  ctx.beginPath();
  ctx.lineWidth=lineW;
  ctx.strokeStyle="#00f2ff";
  ctx.lineCap="round";
  ctx.shadowBlur=20; 
  ctx.shadowColor="#00f2ff";
  ctx.arc(cx,cy,radius,0,2*Math.PI); 
  ctx.stroke();
  ctx.shadowBlur=0;
  const gap=Math.PI/2, rad=angle*Math.PI/180;
  ctx.save();
  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.arc(cx,cy,radius+2,rad-gap/2,rad+gap/2);
  ctx.closePath(); 
  ctx.fill();
  ctx.restore();
  cv.style.transform="scale(1.05)";
  setTimeout(()=>cv.style.transform="scale(1)",300);
}

function updateProgress(){ 
  pbar.style.width = Math.round((level-1)/totalLevels*100)+'%'; 
}

function nextRound(){
  if(level>totalLevels){ finishTest(); return; }
  const angle=directions[Math.floor(Math.random()*4)];
  drawLandolt(angle);
  cv.dataset.angle = angle;
  status.textContent = `Eye: ${eye} | Distance: 40 cm | Level ${level} of ${totalLevels} — select the gap direction`;
  active=true;
  updateProgress();
}

function submitAnswer(ans){
  if(!active || !eye) return;
  let current=parseInt(cv.dataset.angle);
  let diff=Math.abs((ans-current+360)%360);
  if(diff>180) diff=360-diff;
  if(diff<=45) results[eye].correct++;
  radius=Math.max(8,radius*0.72);
  level++; active=false;
  setTimeout(()=>nextRound(),500);
}

controls.forEach(btn=>btn.addEventListener('click',()=>submitAnswer(parseInt(btn.dataset.dir))));
document.addEventListener('keydown',e=>{
  if(!active || !eye) return;
  if(e.key==='ArrowUp') submitAnswer(270);
  else if(e.key==='ArrowDown') submitAnswer(90);
  else if(e.key==='ArrowLeft') submitAnswer(180);
  else if(e.key==='ArrowRight') submitAnswer(0);
});

function finishTest(){
  if(nextEye){ 
    eye = nextEye;
    nextEye = null;
    startTest();
    return;
  }
  // عرض النتيجة بعد انتهاء كلتا العينين
  overlay.style.display='flex';
  popupScore.textContent = `Right Eye: ${results.right.correct}/${totalLevels} | Left Eye: ${results.left.correct}/${totalLevels}`;
  let adviceRight = results.right.correct >= 10 ? "Good vision" : "Check right eye";
  let adviceLeft = results.left.correct >= 10 ? "Good vision" : "Check left eye";
  popupAdvice.textContent = `${adviceRight} — ${adviceLeft}`;
}

// --- SAVE TO HISTORY ---
document.getElementById('saveBtn').onclick = function() {
  if (!currentUserId) {
    alert('Please login first!');
    return;
  }

  const timestamp = Date.now();
  const dateStr = new Date(timestamp).toLocaleString();
  
  const visionData = {
    rightEye: results.right.correct,
    leftEye: results.left.correct,
    timestamp: timestamp,
    date: dateStr,
    deviceId: 'Web-Vision-Test'
  };

  db.ref('PatientData/' + currentUserId + '/VisionHistory').push(visionData)
    .then(() => {
      alert('✅ Results saved successfully!');
      document.getElementById('saveBtn').innerHTML = '<i class="fas fa-check"></i> Saved';
      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveBtn').style.opacity = '0.6';
    })
    .catch(err => {
      console.error('Save error:', err);
      alert('❌ Failed to save results');
    });
};

document.getElementById('retryBtn').onclick = ()=>{
  overlay.style.display='none';
  radius=baseRadius;
  document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Save to History';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').style.opacity = '1';
  if(eye) startTest();
};

document.getElementById('closeBtn').onclick = ()=>overlay.style.display='none';

document.getElementById('exitBtn').addEventListener('click', function() {
  if (document.referrer !== "") {
    window.history.back();
  } else {
    window.location.href = "instruction.html";
  }
});

function speakFinalResult() {
  const text = `Vision test results. Right eye: ${results.right.correct} out of ${totalLevels}. Left eye: ${results.left.correct} out of ${totalLevels}.`;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  speechSynthesis.speak(utterance);
}

</script>


</body>
</html>
