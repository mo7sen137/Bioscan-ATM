<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BioScan | Vision Test</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* --- THEME VARIABLES --- */
    :root {
      --primary-neon: #00f2ff;
      --secondary-neon: #7000ff;
      --bg-dark: #020408;
      --glass-panel: rgba(8, 15, 25, 0.92);
      --border-color: rgba(0, 242, 255, 0.4);
      --text-main: #e0f7fa;
      --error: #ff2a2a;
      --success: #00ff88;
      --warning: #f39c12;
      --vision-color: #1dd1a1;
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 85px;
      padding-bottom: 40px;
    }

    /* BACKGROUND */
    #bio-background {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        overflow: hidden; background: radial-gradient(circle at center, #0f1c2e 0%, #000000 100%);
    }
    .bio-symbol {
        position: absolute; color: var(--primary-neon); opacity: 0.15;
        animation: floatBio 20s linear infinite; pointer-events: none;
    }
    @keyframes floatBio {
        0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
        50% { opacity: 0.2; }
        100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #050b14; }
    ::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 10px; }

    /* HEADER */
    .user-card { 
      position: fixed; top: 0; left: 0; width: 100%; height: 75px;
      background: rgba(5, 10, 18, 0.98); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--primary-neon); 
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.15); z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 15px; margin: 0; border-radius: 0;
      gap: 15px; 
    }
    
    .user-left { 
        display: flex; align-items: center; gap: 10px; 
        flex: 1; min-width: 0; 
    }
    .user-avatar { font-size: 1.6rem; color: var(--primary-neon); filter: drop-shadow(0 0 8px var(--primary-neon)); flex-shrink: 0; }
    .user-info { display: flex; flex-direction: column; overflow: hidden; }
    .user-info h2 { margin: 0; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #ddd; letter-spacing: 1px; white-space: nowrap; text-transform: uppercase; }
    .user-info .user-name { font-size: 1.05rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 2px; }
    .user-info .user-id { font-size: 0.75rem; color: #ddd; font-weight: 400; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    .top-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    
    .icon-btn { 
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
      color: var(--primary-neon); width: 34px; height: 34px; border-radius: 8px;
      cursor: pointer; transition: 0.3s; font-size: 0.9rem;
      display: flex; justify-content: center; align-items: center;
    }
    .icon-btn:hover { background: var(--primary-neon); color: #000; box-shadow: 0 0 15px var(--primary-neon); }

    /* MAIN CARD */
    .instruction-card {
      width: 95%; max-width: 700px; 
      background: linear-gradient(135deg, rgba(10, 20, 35, 0.95), rgba(5, 10, 20, 0.95));
      border: 1px solid var(--primary-neon); border-radius: 20px; 
      padding: 30px; margin-bottom: 20px; 
      display: flex; flex-direction: column; gap: 20px; 
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); 
      position: relative; overflow: hidden; transition: all 0.5s ease;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex; align-items: center; gap: 15px;
      padding-bottom: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.2);
    }

    .card-icon {
      font-size: 2.5rem; color: var(--vision-color);
      filter: drop-shadow(0 0 10px var(--vision-color));
    }

    .card-title {
      flex: 1;
    }

    .card-title h1 {
      margin: 0; font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; color: var(--primary-neon);
      letter-spacing: 1px; font-weight: 700;
    }

    .card-title p {
      margin: 5px 0 0 0; font-size: 0.85rem;
      color: #aaa; font-family: 'Rajdhani', sans-serif;
    }

    .close-btn-header {
      background: rgba(255, 42, 42, 0.1); color: var(--error);
      border: 1px solid var(--error);
      padding: 8px 12px; border-radius: 8px; font-size: 0.85rem;
      cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Orbitron', sans-serif; font-weight: 600;
    }
    .close-btn-header:hover {
      background: var(--error); color: #fff;
      box-shadow: 0 0 15px var(--error);
    }

    /* INSTRUCTIONS LIST */
    .instructions-section {
      display: flex; flex-direction: column; gap: 12px;
    }

    .instruction-item {
      display: flex; gap: 15px; 
      background: rgba(0, 242, 255, 0.05);
      border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 12px; padding: 15px;
      transition: all 0.3s ease;
      align-items: flex-start;
    }

    .instruction-item:hover {
      background: rgba(0, 242, 255, 0.1);
      border-color: var(--primary-neon);
      transform: translateX(5px);
    }

    .instr-icon {
      min-width: 40px; height: 40px;
      background: rgba(0, 242, 255, 0.15);
      border: 1px solid var(--primary-neon);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--vision-color);
      font-size: 1.1rem; flex-shrink: 0;
    }

    .instr-content {
      flex: 1;
    }

    .instr-content p {
      margin: 0; font-size: 0.95rem;
      color: #e0f7fa; line-height: 1.5;
      font-weight: 500;
    }

    .instr-number {
      display: inline-block;
      background: var(--primary-neon);
      color: #000;
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      margin-right: 8px;
    }

    /* START BUTTON */
    .btn-container {
      display: flex; justify-content: center; gap: 15px;
      padding-top: 10px;
    }

    .start-btn {
      padding: 14px 30px; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #11998e, #38ef7d);
      color: #fff; font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem; letter-spacing: 1px; font-weight: bold;
      cursor: pointer; transition: 0.3s; 
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 0 20px rgba(56, 239, 125, 0.3);
      animation: glowGreen 3s infinite ease-in-out;
    }

    @keyframes glowGreen {
      0%, 100% { box-shadow: 0 0 20px rgba(56, 239, 125, 0.3); }
      50% { box-shadow: 0 0 40px rgba(56, 239, 125, 0.6); }
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(56, 239, 125, 0.8);
    }

    .start-btn i { font-size: 1.1rem; }

    .back-btn {
      padding: 14px 30px; border: 1px solid var(--primary-neon);
      background: transparent; color: var(--primary-neon);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem; letter-spacing: 1px; font-weight: bold;
      border-radius: 12px;
      cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .back-btn:hover {
      background: var(--primary-neon);
      color: #000;
      box-shadow: 0 0 20px var(--primary-neon);
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      body { padding-top: 75px; padding-bottom: 30px; }
      .instruction-card { padding: 20px; max-width: 95%; }
      
      .card-header { flex-direction: column; gap: 12px; text-align: center; }
      .card-icon { font-size: 2rem; }
      .card-title h1 { font-size: 1.3rem; }
      .card-title p { font-size: 0.8rem; }
      .close-btn-header { width: 100%; justify-content: center; }

      .instruction-item { padding: 12px; gap: 12px; }
      .instr-icon { width: 35px; height: 35px; font-size: 0.95rem; }
      .instr-content p { font-size: 0.9rem; }

      .btn-container { flex-direction: column; gap: 12px; }
      .start-btn, .back-btn { width: 100%; padding: 12px 20px; font-size: 0.9rem; }
    }

    @media (max-width: 480px) {
      .user-info h2 { font-size: 0.6rem; }
      .user-name { font-size: 0.9rem; }
      .icon-btn { width: 30px; height: 30px; font-size: 0.8rem; }

      .instruction-card { padding: 18px; margin-bottom: 15px; }
      .card-header { gap: 10px; }
      .card-icon { font-size: 1.8rem; }
      .card-title h1 { font-size: 1.2rem; }
      .close-btn-header { padding: 6px 10px; font-size: 0.75rem; }

      .instruction-item { padding: 10px; gap: 10px; }
      .instr-icon { width: 32px; height: 32px; font-size: 0.85rem; }
      .instr-content p { font-size: 0.85rem; }
      .instr-number { width: 20px; height: 20px; font-size: 0.7rem; }

      .start-btn, .back-btn { padding: 11px 18px; font-size: 0.85rem; }
    }

  </style>

</head>

<body>

  <div id="bio-background"></div>

  <div class="user-card">
    <div class="user-left">
        <div class="user-avatar"><i class="fas fa-eye"></i></div>
        <div class="user-info">
            <span class="user-name" id="headerTitle">Vision Test</span>
            <span class="user-id" id="headerSubtitle">Follow Instructions</span>
        </div>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="langBtn" onclick="toggleLanguage()" title="Switch Language">
        AR
      </button>
      <button class="icon-btn" onclick="goBack()" title="Back">
        <i class="fas fa-arrow-left"></i>
      </button>
    </div>
  </div>

  <div class="instruction-card">
    <div class="card-header">
      <div class="card-icon"><i class="fas fa-eye"></i></div>
      <div class="card-title">
        <h1 id="cardTitle">Vision Test Instructions</h1>
        <p id="cardSubtitle">Follow these steps carefully</p>
      </div>
    </div>

    <div class="instructions-section" id="instrList">
      <!-- Instructions will be generated by script -->
    </div>

    <div class="btn-container">
      <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> <span>Back</span>
      </button>
      <button class="start-btn" onclick="startTest()">
        <span>Start Test</span> <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <script>
    let currentLang = localStorage.getItem("language") || "en";

    const ui = {
      en: {
        title: 'Vision Test',
        subtitle: 'Follow Instructions',
        cardTitle: 'Vision Test Instructions',
        cardSubtitle: 'Follow these steps carefully',
        back: 'Back',
        start: 'Start Test',
        switchLanguage: 'Switch Language',
        backTitle: 'Back'
      },
      ar: {
        title: 'اختبار الرؤية',
        subtitle: 'اتبع التعليمات',
        cardTitle: 'تعليمات الاختبار',
        cardSubtitle: 'اتبع هذه الخطوات بعناية',
        back: 'رجوع',
        start: 'ابدأ الاختبار',
        switchLanguage: 'تبديل اللغة',
        backTitle: 'رجوع'
      }
    };
    
    // Create background animations
    function createBioBackground() {
        const container = document.getElementById('bio-background');
        const icons = ['fa-dna', 'fa-heartbeat', 'fa-eye', 'fa-glasses', 'fa-stethoscope', 'fa-microscope', 'fa-user-md', 'fa-syringe', 'fa-lungs', 'fa-brain'];
        const count = 30;
        for (let i = 0; i < count; i++) {
            const el = document.createElement('i');
            el.classList.add('fas', icons[Math.floor(Math.random() * icons.length)], 'bio-symbol');
            el.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 2 + 0.5;
            el.style.fontSize = size + 'rem';
            el.style.opacity = Math.random() * 0.2;
            el.style.animationDuration = (Math.random() * 20 + 15) + 's';
            el.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(el);
        }
    }
    createBioBackground();

    // Instructions data
    const instructionsEN = [
      { icon: 'fas fa-lightbulb', text: 'Make sure you are in a well-lit room.' },
      { icon: 'fas fa-desktop', text: 'Keep your screen at a comfortable distance (about 50cm).' },
      { icon: 'fas fa-glasses', text: 'Wear your glasses or contact lenses if you usually use them.' },
      { icon: 'fas fa-chair', text: 'Sit straight and keep your head steady.' },
      { icon: 'fas fa-eye', text: 'Look directly at the center of the screen.' },
      { icon: 'fas fa-play-circle', text: 'Press the Start button to begin the test.' }
    ];

    const instructionsAR = [
      { icon: 'fas fa-lightbulb', text: 'تأكد من وجود إضاءة جيدة في الغرفة.' },
      { icon: 'fas fa-desktop', text: 'ضع الشاشة على مسافة مريحة (حوالي 50 سم).' },
      { icon: 'fas fa-glasses', text: 'ارتدِ نظارتك أو عدساتك اللاصقة إذا كنت تستخدمها.' },
      { icon: 'fas fa-chair', text: 'اجلس بظهر مستقيم وأبقِ رأسك ثابتاً.' },
      { icon: 'fas fa-eye', text: 'انظر مباشرة إلى مركز الشاشة.' },
      { icon: 'fas fa-play-circle', text: 'اضغط على زر البدء لبدء الاختبار.' }
    ];

    function renderInstructions(lang) {
      const instrList = document.getElementById('instrList');
      const instructions = lang === 'ar' ? instructionsAR : instructionsEN;
      
      instrList.innerHTML = instructions.map((item, index) => `
        <div class="instruction-item">
          <div class="instr-icon">
            <i class="${item.icon}"></i>
          </div>
          <div class="instr-content">
            <p>
              <span class="instr-number">${index + 1}</span>
              ${item.text}
            </p>
          </div>
        </div>
      `).join('');
    }

    // Language toggle
    function toggleLanguage() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('language', currentLang);
      applyLanguage();
    }

    function applyLanguage() {
      const isAr = currentLang === 'ar';
      const t = isAr ? ui.ar : ui.en;

      document.body.dir = isAr ? 'rtl' : 'ltr';
      document.documentElement.lang = isAr ? 'ar' : 'en';

      document.getElementById('headerTitle').textContent = t.title;
      document.getElementById('headerSubtitle').textContent = t.subtitle;
      document.getElementById('cardTitle').textContent = t.cardTitle;
      document.getElementById('cardSubtitle').textContent = t.cardSubtitle;
      document.getElementById('langBtn').textContent = isAr ? 'EN' : 'AR';
      document.getElementById('langBtn').title = t.switchLanguage;
      document.querySelector('.top-actions .icon-btn:last-child').title = t.backTitle;
      document.querySelector('.back-btn').innerHTML = isAr
        ? '<span>' + t.back + '</span> <i class="fas fa-arrow-right"></i>'
        : '<i class="fas fa-arrow-left"></i> <span>' + t.back + '</span>';
      document.querySelector('.start-btn').innerHTML = isAr
        ? '<span>' + t.start + '</span> <i class="fas fa-arrow-left"></i>'
        : '<span>' + t.start + '</span> <i class="fas fa-arrow-right"></i>';

      renderInstructions(currentLang);
    }

    // Navigation
    function goBack() {
      window.location.href = 'measurements.html';
    }

    function startTest() {
      window.location.href = 'test.html';
    }

    // Initialize
    applyLanguage();
  </script>

</body>
</html>
